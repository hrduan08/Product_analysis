<svg width="1150" height="750" viewBox="0 0 1150 750" xmlns="http://www.w3.org/2000/svg">
  <style>
    .actor { fill:#ffffff; stroke:#1f2933; stroke-width:2; }
    .label { font:600 16px 'Arial',sans-serif; fill:#111827; }
    .line { stroke:#9ca3af; stroke-width:2; stroke-dasharray:6 4; }
    .arrow { stroke:#111827; stroke-width:2; marker-end:url(#arrowhead); }
    .msg { font:13px 'Arial',sans-serif; fill:#111827; }
    .legendbox { fill:#ffffff; stroke:#1f2933; stroke-width:1.5; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1150" height="750" fill="#ffffff" stroke="#e5e7eb" />

  <g>
    <rect x="40" y="40" width="120" height="50" class="actor" />
    <text x="60" y="70" class="label">User</text>
    <line x1="100" y1="90" x2="100" y2="650" class="line" />
  </g>
  <g>
    <rect x="200" y="40" width="140" height="50" class="actor" />
    <text x="220" y="70" class="label">Auth API</text>
    <line x1="270" y1="90" x2="270" y2="650" class="line" />
  </g>
  <g>
    <rect x="380" y="40" width="150" height="50" class="actor" />
    <text x="395" y="70" class="label">Subscription API</text>
    <line x1="455" y1="90" x2="455" y2="650" class="line" />
  </g>
  <g>
    <rect x="560" y="40" width="160" height="50" class="actor" />
    <text x="580" y="70" class="label">Billing Service</text>
    <line x1="640" y1="90" x2="640" y2="650" class="line" />
  </g>
  <g>
    <rect x="760" y="40" width="160" height="50" class="actor" />
    <text x="780" y="70" class="label">Scheduler</text>
    <line x1="840" y1="90" x2="840" y2="650" class="line" />
  </g>
  <g>
    <rect x="940" y="40" width="160" height="50" class="actor" />
    <text x="960" y="70" class="label">SendGrid</text>
    <line x1="1020" y1="90" x2="1020" y2="650" class="line" />
  </g>

  <line x1="100" y1="130" x2="270" y2="130" class="arrow" />
  <text x="110" y="115" class="msg">[1] 注册账号 (email + password)</text>
  <line x1="270" y1="160" x2="100" y2="160" class="arrow" />
  <text x="150" y="150" class="msg">[2] 发送验证邮件链接</text>
  <line x1="100" y1="190" x2="270" y2="190" class="arrow" />
  <text x="110" y="180" class="msg">[3] 点击验证链接完成激活</text>

  <line x1="100" y1="230" x2="455" y2="230" class="arrow" />
  <text x="150" y="215" class="msg">[4] 创建订阅 (关键词/平台/频率)</text>
  <line x1="455" y1="260" x2="640" y2="260" class="arrow" />
  <text x="480" y="250" class="msg">[5] 检查试用资格 / 激活试用</text>
  <line x1="640" y1="290" x2="455" y2="290" class="arrow" />
  <text x="500" y="280" class="msg">[6] 返回试用到期时间</text>
  <line x1="455" y1="320" x2="100" y2="320" class="arrow" />
  <text x="170" y="305" class="msg">[7] 返回订阅创建成功</text>

  <line x1="640" y1="360" x2="455" y2="360" class="arrow" />
  <text x="530" y="345" class="msg">[8] 试用到期提醒 (24h 前)</text>
  <line x1="455" y1="390" x2="100" y2="390" class="arrow" />
  <text x="180" y="375" class="msg">[9] 发送提醒邮件给用户</text>

  <line x1="100" y1="430" x2="640" y2="430" class="arrow" />
  <text x="180" y="420" class="msg">[10] 用户升级套餐 (支付请求)</text>
  <line x1="640" y1="460" x2="455" y2="460" class="arrow" />
  <text x="520" y="450" class="msg">[11] 支付成功回调 → 更新 plan</text>
  <line x1="455" y1="490" x2="100" y2="490" class="arrow" />
  <text x="180" y="475" class="msg">[12] 返回升级成功</text>

  <line x1="840" y1="530" x2="600" y2="530" class="arrow" />
  <text x="680" y="515" class="msg">[13] Cron 读取活跃订阅</text>
  <line x1="840" y1="560" x2="1020" y2="560" class="arrow" />
  <text x="880" y="545" class="msg">[14] SendGrid 发送邮件</text>
  <line x1="1020" y1="590" x2="840" y2="590" class="arrow" />
  <text x="900" y="575" class="msg">[15] 返回 messageId</text>
  <line x1="840" y1="620" x2="455" y2="620" class="arrow" />
  <text x="620" y="605" class="msg">[16] 写入 notify_jobs / job_logs</text>

  <rect x="40" y="660" width="1070" height="70" class="legendbox" />
  <text x="60" y="690" class="label" style="font-size:15px;">步骤说明</text>
  <text x="60" y="715" class="msg">[1]-[3] 注册与邮箱验证 · [4]-[7] 创建订阅与试用激活 · [8]-[12] 试用提醒与付费升级 · [13]-[16] Cron 逐订阅发送邮件并记录结果</text>
</svg>
