<svg width="1000" height="550" viewBox="0 0 1000 550" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill:#ffffff; stroke:#1f2933; stroke-width:2; rx:10; ry:10; }
    .label { font:600 16px 'Arial',sans-serif; fill:#111827; }
    .text { font:14px 'Arial',sans-serif; fill:#111827; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="550" fill="#ffffff" stroke="#e5e7eb" />

  <rect x="40" y="40" width="240" height="200" class="box" />
  <text x="60" y="70" class="label">Client (Web / Mobile)</text>
  <text x="60" y="100" class="text">• 注册 / 登录 / 订阅管理</text>
  <text x="60" y="125" class="text">• 查看试用状态与套餐</text>
  <text x="60" y="150" class="text">• 退订 / 升级入口</text>

  <rect x="330" y="40" width="200" height="200" class="box" />
  <text x="350" y="70" class="label">REST API</text>
  <text x="350" y="100" class="text">• Auth 服务 (JWT)</text>
  <text x="350" y="125" class="text">• Subscription CRUD</text>
  <text x="350" y="150" class="text">• Billing / Payments</text>

  <rect x="560" y="40" width="180" height="200" class="box" />
  <text x="580" y="70" class="label">Service Layer</text>
  <text x="580" y="100" class="text">• Trial/Plan 校验</text>
  <text x="580" y="125" class="text">• 调用 Provider 抓取</text>
  <text x="580" y="150" class="text">• 触发邮件模板</text>

  <rect x="780" y="40" width="180" height="200" class="box" />
  <text x="800" y="70" class="label">Billing Provider</text>
  <text x="800" y="100" class="text">• Stripe / 国内支付</text>
  <text x="800" y="125" class="text">• 订阅状态回调</text>

  <rect x="330" y="280" width="300" height="200" class="box" />
  <text x="350" y="310" class="label">PostgreSQL</text>
  <text x="350" y="340" class="text">• users / user_profiles</text>
  <text x="350" y="365" class="text">• subscriptions / subscription_keywords</text>
  <text x="350" y="390" class="text">• payments / user_plans</text>
  <text x="350" y="415" class="text">• feedback_items / notify_jobs</text>

  <rect x="660" y="280" width="140" height="200" class="box" />
  <text x="680" y="310" class="label">Scheduler</text>
  <text x="680" y="340" class="text">• 读取活跃订阅</text>
  <text x="680" y="365" class="text">• 生成增量邮件</text>
  <text x="680" y="390" class="text">• 更新 notify_jobs</text>

  <rect x="830" y="280" width="130" height="200" class="box" />
  <text x="845" y="310" class="label">Mail Provider</text>
  <text x="845" y="340" class="text">• SendGrid / SMTP</text>
  <text x="845" y="365" class="text">• 打开率 / 退订统计</text>

  <line x1="280" y1="140" x2="330" y2="140" stroke="#111827" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="530" y1="140" x2="560" y2="140" stroke="#111827" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="740" y1="140" x2="780" y2="140" stroke="#111827" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="420" y1="240" x2="420" y2="280" stroke="#111827" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="530" y1="240" x2="600" y2="280" stroke="#111827" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="660" y1="380" x2="630" y2="380" stroke="#111827" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="730" y1="380" x2="830" y2="380" stroke="#111827" stroke-width="2" marker-end="url(#arrow)" />
</svg>
