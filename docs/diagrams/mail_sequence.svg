<svg width="1320" height="760" viewBox="0 0 1320 760" xmlns="http://www.w3.org/2000/svg">
    <style>
    .actor { fill:#ffffff; stroke:#000000; stroke-width:3; }
    .label { font:700 18px 'Arial',sans-serif; fill:#000000; }
    .line { stroke:#000000; stroke-width:2; stroke-dasharray:6 4; }
    .arrow { stroke:#000000; stroke-width:3; marker-end:url(#arrowhead); }
    .msg { font:700 15px 'Arial',sans-serif; fill:#000000; }
    .stepbox { fill:#ffffff; stroke:#000000; stroke-width:2; rx:6; ry:6; }
    .stepnum { font:700 14px 'Arial',sans-serif; fill:#000000; }
    .steptext { font:14px 'Arial',sans-serif; fill:#000000; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="14" markerHeight="10" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 14 5, 0 10" fill="#000000"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1320" height="760" fill="#ffffff"/>
  <!-- actors -->
  <g>
    <rect x="20" y="20" width="130" height="50" class="actor"/>
    <text x="35" y="50" class="label">Cron 调度</text>
    <line x1="85" y1="70" x2="85" y2="560" class="line"/>
  </g>
  <g>
    <rect x="170" y="20" width="145" height="50" class="actor"/>
    <text x="185" y="50" class="label">Keyword Sync</text>
    <line x1="242" y1="70" x2="242" y2="560" class="line"/>
  </g>
  <g>
    <rect x="330" y="20" width="135" height="50" class="actor"/>
    <text x="345" y="50" class="label">Provider</text>
    <line x1="398" y1="70" x2="398" y2="560" class="line"/>
  </g>
  <g>
    <rect x="480" y="20" width="150" height="50" class="actor"/>
    <text x="495" y="50" class="label">Feedback Store</text>
    <line x1="555" y1="70" x2="555" y2="560" class="line"/>
  </g>
  <g>
    <rect x="650" y="20" width="140" height="50" class="actor"/>
    <text x="665" y="50" class="label">Mail Composer</text>
    <line x1="720" y1="70" x2="720" y2="560" class="line"/>
  </g>
  <g>
    <rect x="800" y="20" width="140" height="50" class="actor"/>
    <text x="818" y="50" class="label">Mail Sender</text>
    <line x1="870" y1="70" x2="870" y2="560" class="line"/>
  </g>
  <g>
    <rect x="950" y="20" width="150" height="50" class="actor"/>
    <text x="967" y="50" class="label">Notify Service</text>
    <line x1="1025" y1="70" x2="1025" y2="560" class="line"/>
  </g>
  <g>
    <rect x="1120" y="20" width="150" height="50" class="actor"/>
    <text x="1145" y="50" class="label">PostgreSQL</text>
    <line x1="1195" y1="70" x2="1195" y2="560" class="line"/>
  </g>
  <g>
    <rect x="1280" y="20" width="35" height="50" class="actor"/>
    <text x="1286" y="50" class="label" style="font-size:13px;">Mail API</text>
    <line x1="1298" y1="70" x2="1298" y2="560" class="line"/>
  </g>

  <!-- arrows with labels -->
  <line x1="85" y1="110" x2="242" y2="110" class="arrow"/>
  <text x="95" y="98" class="msg">[1] runWithLock() 触发任务</text>

  <line x1="242" y1="150" x2="398" y2="150" class="arrow"/>
  <text x="250" y="140" class="msg">[2] Provider.search(query, platform)</text>

  <line x1="398" y1="185" x2="242" y2="185" class="arrow"/>
  <text x="290" y="175" class="msg">[3] 返回标准化 FeedbackItem[]</text>

  <line x1="242" y1="225" x2="555" y2="225" class="arrow"/>
  <text x="300" y="215" class="msg">[4] upsertFeedbackItems()</text>

  <line x1="555" y1="255" x2="1195" y2="255" class="arrow"/>
  <text x="720" y="245" class="msg">[5] INSERT/UPDATE feedback_items</text>

  <line x1="1195" y1="285" x2="555" y2="285" class="arrow"/>
  <text x="780" y="275" class="msg">[6] 返回 upsert 结果</text>

  <line x1="242" y1="320" x2="555" y2="320" class="arrow"/>
  <text x="255" y="310" class="msg">[7] getNewFeedbackItemsSince(lastRun)</text>

  <line x1="555" y1="350" x2="1195" y2="350" class="arrow"/>
  <text x="690" y="340" class="msg">[8] 查询 first_seen_at &gt; lastRun</text>

  <line x1="1195" y1="380" x2="242" y2="380" class="arrow"/>
  <text x="650" y="370" class="msg">[9] 返回新增记录列表</text>

  <line x1="242" y1="410" x2="720" y2="410" class="arrow"/>
  <text x="370" y="400" class="msg">[10] buildMailContent(newItems)</text>

  <line x1="720" y1="440" x2="870" y2="440" class="arrow"/>
  <text x="730" y="430" class="msg">[11] sendMail(payload)</text>

  <line x1="870" y1="470" x2="1298" y2="470" class="arrow"/>
  <text x="940" y="460" class="msg">[12] 调用外部邮件 API / SMTP</text>

  <line x1="1298" y1="500" x2="870" y2="500" class="arrow"/>
  <text x="1040" y="490" class="msg">[13] 返回 messageId / error</text>

  <line x1="870" y1="525" x2="720" y2="525" class="arrow"/>
  <text x="760" y="515" class="msg">[14] 回传发送结果</text>

  <line x1="242" y1="545" x2="1025" y2="545" class="arrow"/>
  <text x="430" y="535" class="msg">[15] recordNotifyJob(status,total_new,messageId)</text>

  <line x1="1025" y1="570" x2="1195" y2="570" class="arrow"/>
  <text x="1055" y="560" class="msg">[16] 写入 notify_jobs</text>

  <!-- legend -->
  <g transform="translate(40,600)">
    <rect x="0" y="0" width="1240" height="160" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
    <text x="20" y="25" class="label" style="font-size:15px;">步骤说明</text>
    <g transform="translate(20,40)">
      <rect width="390" height="50" class="stepbox"/>
      <text x="10" y="20" class="stepnum">[1]</text>
      <text x="35" y="20" class="steptext">Cron 调度调用 runWithLock()，判断是否执行本轮任务。</text>
      <text x="35" y="38" class="steptext">决定关键词/平台组合并进入 Provider 流程。</text>
    </g>
    <g transform="translate(430,40)">
      <rect width="390" height="50" class="stepbox"/>
      <text x="10" y="20" class="stepnum">[2]-[4]</text>
      <text x="40" y="20" class="steptext">Keyword Sync 调用 Provider.search()，返回标准化 FeedbackItem。</text>
      <text x="40" y="38" class="steptext">Feedback Store upsert 到 feedback_items，自动去重。</text>
    </g>
    <g transform="translate(840,40)">
      <rect width="360" height="50" class="stepbox"/>
      <text x="10" y="20" class="stepnum">[5]-[9]</text>
      <text x="40" y="20" class="steptext">根据上次成功时间查询新增记录，准备推送数据。</text>
      <text x="40" y="38" class="steptext">若无新增可提前退出或发送空内容提示。</text>
    </g>
    <g transform="translate(20,100)">
      <rect width="390" height="50" class="stepbox"/>
      <text x="10" y="20" class="stepnum">[10]-[13]</text>
      <text x="45" y="20" class="steptext">Mail Composer 生成主题 / HTML / Text，Mail Sender 调用外部邮件 API。</text>
      <text x="45" y="38" class="steptext">捕获 messageId 或错误信息以便追踪。</text>
    </g>
    <g transform="translate(430,100)">
      <rect width="390" height="50" class="stepbox"/>
      <text x="10" y="20" class="stepnum">[14]-[16]</text>
      <text x="45" y="20" class="steptext">将发送结果回传 Keyword Sync，写入 notify_jobs。</text>
      <text x="45" y="38" class="steptext">记录总新增条数、状态、错误详情。</text>
    </g>
  </g>
</svg>
